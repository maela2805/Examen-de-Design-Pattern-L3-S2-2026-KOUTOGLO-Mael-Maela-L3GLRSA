spring.application.name=payment-service
server.port=8081

# PostgreSQL - Base de données dédiée au payment-service
spring.datasource.url=jdbc:postgresql://localhost:5432/orm_payment
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=passer

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Hikari Connection Pool Config (limit to prevent too many clients error)
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
